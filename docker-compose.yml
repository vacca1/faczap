services:
  # FatorZap — Next.js CRM. WhatsApp is provided by the standalone OpenWA
  # service (separate stack) reachable at https://openwa.smarts.solutions/api.
  fatorzap:
    image: ghcr.io/vacca1/faczap/fatorzap:latest
    container_name: fatorzap
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      NEXT_PUBLIC_SITE_URL: "https://fatorzap.smarts.solutions"
      # Standalone OpenWA (admin API key — server-side only, never exposed)
      OPENWA_BASE_URL: "https://openwa.smarts.solutions/api"
      OPENWA_API_KEY: "${OPENWA_API_KEY}"
      OPENWA_WEBHOOK_SECRET: "${OPENWA_WEBHOOK_SECRET:-}"
      AUTOMATION_CRON_SECRET: "${AUTOMATION_CRON_SECRET:-}"
    networks:
      - fatorzap_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode < 400 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.fatorzap.rule=Host(`fatorzap.smarts.solutions`)"
      - "traefik.http.routers.fatorzap.entrypoints=websecure"
      - "traefik.http.routers.fatorzap.tls.certresolver=leresolver"
      # Service port
      - "traefik.http.services.fatorzap.loadbalancer.server.port=3000"

networks:
  fatorzap_net:
    name: fatorzap_net
    driver: bridge
