version: "3.9"

services:
  # OpenWA — WhatsApp Web bridge
  openwa:
    image: ghcr.io/vacca1/faczap/openwa:latest
    container_name: openwa
    restart: unless-stopped
    ports:
      - "2785:2785"
      - "2886:2886"
    environment:
      API_PORT: "2785"
      DASHBOARD_PORT: "2886"
      API_MASTER_KEY: "${OPENWA_API_KEY:-changeme}"
      DATABASE_TYPE: "sqlite"
      STORAGE_TYPE: "local"
      ENGINE_TYPE: "whatsapp-web.js"
      DEFAULT_WEBHOOK_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}/api/whatsapp/webhook"
    volumes:
      - openwa_data:/app/data
      - openwa_sessions:/app/.wwebjs_auth
    networks:
      - fatorzap_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2785/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # FatorZap — Next.js CRM
  fatorzap:
    image: ghcr.io/vacca1/faczap/fatorzap:latest
    container_name: fatorzap
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
      OPENWA_BASE_URL: "http://openwa:2785/api"
      OPENWA_WEBHOOK_SECRET: "${OPENWA_WEBHOOK_SECRET:-}"
    depends_on:
      openwa:
        condition: service_healthy
    networks:
      - fatorzap_net

volumes:
  openwa_data:
  openwa_sessions:

networks:
  fatorzap_net:
    driver: bridge
