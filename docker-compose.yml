services:
  # OpenWA — WhatsApp Web bridge
  openwa:
    image: ghcr.io/vacca1/faczap/openwa:latest
    container_name: openwa
    restart: unless-stopped
    expose:
      - "2785"
    environment:
      API_PORT: "2785"
      API_MASTER_KEY: "${OPENWA_API_KEY:-changeme}"
      DATABASE_TYPE: "sqlite"
      STORAGE_TYPE: "local"
      ENGINE_TYPE: "whatsapp-web.js"
      DEFAULT_WEBHOOK_URL: "http://fatorzap:3000/api/whatsapp/webhook"
    volumes:
      - openwa_data:/app/data
      - openwa_sessions:/app/.wwebjs_auth
    networks:
      - fatorzap_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # FatorZap — Next.js CRM
  fatorzap:
    image: ghcr.io/vacca1/faczap/fatorzap:latest
    container_name: fatorzap
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      NEXT_PUBLIC_SITE_URL: "https://fatorzap.smarts.solutions"
      OPENWA_BASE_URL: "http://openwa:2785/api"
      OPENWA_WEBHOOK_SECRET: "${OPENWA_WEBHOOK_SECRET:-}"
      AUTOMATION_CRON_SECRET: "${AUTOMATION_CRON_SECRET:-}"
    depends_on:
      openwa:
        condition: service_healthy
    networks:
      - fatorzap_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode < 400 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.fatorzap.rule=Host(`fatorzap.smarts.solutions`)"
      - "traefik.http.routers.fatorzap.entrypoints=websecure"
      - "traefik.http.routers.fatorzap.tls.certresolver=leresolver"
      # Service port
      - "traefik.http.services.fatorzap.loadbalancer.server.port=3000"

volumes:
  openwa_data:
  openwa_sessions:

networks:
  fatorzap_net:
    name: fatorzap_net
    driver: bridge
